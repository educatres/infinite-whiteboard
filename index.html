<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>無邊際白板</title>
  <style>
    :root {
      color-scheme: light;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-border: rgba(38, 56, 79, 0.16);
      --ink: #172033;
      --muted: #627089;
      --accent: #0f8b8d;
      --accent-soft: rgba(15, 139, 141, 0.12);
      --danger: #b42318;
      --shadow: 0 10px 30px rgba(33, 44, 62, 0.14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #f7f9fb;
    }

    body {
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #app {
      position: fixed;
      inset: 0;
      min-width: 320px;
      min-height: 320px;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #board {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #fff;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      cursor: crosshair;
    }

    #board.panning {
      cursor: grab;
    }

    #board.dragging-pan {
      cursor: grabbing;
    }

    #toolbar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 54px;
      padding: 8px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
      padding-right: 8px;
      border-right: 1px solid rgba(38, 56, 79, 0.12);
    }

    .tool-group:last-child {
      border-right: 0;
      padding-right: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      appearance: none;
      border: 1px solid rgba(38, 56, 79, 0.14);
      border-radius: 7px;
      min-width: 38px;
      height: 38px;
      padding: 0 10px;
      color: var(--ink);
      background: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease, transform 140ms ease;
    }

    button:hover {
      background: #f2f7f8;
      border-color: rgba(15, 139, 141, 0.3);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      color: #9aa5b4;
      background: #f3f6f8;
      cursor: not-allowed;
      opacity: 0.68;
      transform: none;
    }

    button.active {
      color: var(--accent);
      border-color: rgba(15, 139, 141, 0.42);
      background: var(--accent-soft);
    }

    button.danger {
      color: var(--danger);
    }

    .icon-button {
      width: 38px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
    }

    .color-control {
      width: 38px;
      height: 38px;
      padding: 3px;
      border: 1px solid rgba(38, 56, 79, 0.14);
      border-radius: 7px;
      background: #fff;
      cursor: pointer;
    }

    .swatch-row {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 38px;
      padding: 0 6px;
      border: 1px solid rgba(38, 56, 79, 0.14);
      border-radius: 7px;
      background: #fff;
    }

    .color-swatch {
      width: 24px;
      min-width: 24px;
      height: 24px;
      padding: 0;
      border: 2px solid transparent;
      border-radius: 50%;
      background: var(--swatch-color);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
    }

    .color-swatch.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18), 0 0 0 2px rgba(15, 139, 141, 0.18);
    }

    .width-control {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 38px;
      padding: 0 10px;
      border: 1px solid rgba(38, 56, 79, 0.14);
      border-radius: 7px;
      background: #fff;
      color: var(--muted);
      white-space: nowrap;
    }

    .width-control input {
      width: 108px;
      accent-color: var(--accent);
    }

    #widthValue {
      min-width: 34px;
      color: var(--ink);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    #zoomLabel {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 66px;
      height: 38px;
      padding: 0 10px;
      border-radius: 7px;
      background: #eef3f6;
      color: #26364d;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    #status {
      position: fixed;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 11;
      max-width: min(560px, calc(100vw - 24px));
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(23, 32, 51, 0.9);
      color: #fff;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 12px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #status.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    #stickyEditor {
      position: fixed;
      z-index: 9;
      display: none;
      min-width: 56px;
      min-height: 44px;
      padding: 8px;
      border: 0;
      border-radius: 6px;
      outline: 2px solid rgba(15, 139, 141, 0.42);
      background: rgba(255, 255, 255, 0.24);
      color: #172033;
      font: 15px/1.35 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      resize: none;
      box-shadow: inset 0 0 0 1px rgba(23, 32, 51, 0.08);
    }

    @media (max-width: 720px) {
      #toolbar {
        top: auto;
        bottom: max(10px, env(safe-area-inset-bottom));
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        min-height: 58px;
      }

      .width-control input {
        width: 92px;
      }

      #status {
        bottom: calc(max(10px, env(safe-area-inset-bottom)) + 72px);
      }
    }
  </style>
</head>
<body>
  <main id="app" aria-label="無邊際白板">
    <canvas id="board"></canvas>

    <div id="toolbar" role="toolbar" aria-label="白板工具列">
      <div class="tool-group" aria-label="繪圖工具">
        <button class="icon-button active" type="button" data-tool="pen" title="筆刷" aria-label="筆刷">✎</button>
        <button class="icon-button" type="button" data-tool="eraser" title="橡皮擦" aria-label="橡皮擦">⌫</button>
        <button class="icon-button" type="button" data-tool="strokeEraser" title="筆畫橡皮擦" aria-label="筆畫橡皮擦">⌧</button>
        <button class="icon-button" type="button" data-tool="select" title="選擇筆畫" aria-label="選擇筆畫">☝</button>
        <button class="icon-button" type="button" data-tool="pan" title="平移" aria-label="平移">↔</button>
        <button class="icon-button" type="button" data-tool="line" title="直線" aria-label="直線">╱</button>
        <button class="icon-button" type="button" data-tool="rect" title="長方形" aria-label="長方形">□</button>
        <button class="icon-button" type="button" data-tool="circle" title="圓形" aria-label="圓形">○</button>
        <button class="icon-button" type="button" data-tool="ellipse" title="橢圓形" aria-label="橢圓形">◯</button>
      </div>

      <div class="tool-group" aria-label="筆觸設定">
        <input class="color-control" id="colorPicker" type="color" value="#172033" title="顏色" aria-label="顏色">
        <div class="swatch-row" aria-label="快速顏色">
          <button class="color-swatch active" type="button" data-color="#172033" style="--swatch-color: #172033" title="黑色" aria-label="黑色"></button>
          <button class="color-swatch" type="button" data-color="#1d4ed8" style="--swatch-color: #1d4ed8" title="藍色" aria-label="藍色"></button>
          <button class="color-swatch" type="button" data-color="#dc2626" style="--swatch-color: #dc2626" title="紅色" aria-label="紅色"></button>
          <button class="color-swatch" type="button" data-color="#15803d" style="--swatch-color: #15803d" title="綠色" aria-label="綠色"></button>
          <button class="color-swatch" type="button" data-color="#7e22ce" style="--swatch-color: #7e22ce" title="紫色" aria-label="紫色"></button>
        </div>
        <label class="width-control" title="粗細">
          粗細
          <input id="widthSlider" type="range" min="1" max="60" value="4" aria-label="粗細">
          <span id="widthValue">4px</span>
        </label>
        <button class="icon-button active" id="smoothToggleBtn" type="button" title="筆跡平滑" aria-label="筆跡平滑" aria-pressed="true">≈</button>
      </div>

      <div class="tool-group" aria-label="白板操作">
        <button id="addStickyBtn" type="button" title="加入便條" aria-label="加入便條">＋便條</button>
        <div class="swatch-row" aria-label="便條顏色">
          <button class="color-swatch active" type="button" data-sticky-color="#fef08a" style="--swatch-color: #fef08a" title="淡黃色便條" aria-label="淡黃色便條"></button>
          <button class="color-swatch" type="button" data-sticky-color="#bbf7d0" style="--swatch-color: #bbf7d0" title="淡綠色便條" aria-label="淡綠色便條"></button>
          <button class="color-swatch" type="button" data-sticky-color="#fbcfe8" style="--swatch-color: #fbcfe8" title="粉紅色便條" aria-label="粉紅色便條"></button>
          <button class="color-swatch" type="button" data-sticky-color="#bfdbfe" style="--swatch-color: #bfdbfe" title="粉藍色便條" aria-label="粉藍色便條"></button>
        </div>
        <button class="icon-button" id="undoBtn" type="button" title="返回上一步" aria-label="返回上一步" disabled>↶</button>
        <button class="icon-button danger" id="deleteSelectedBtn" type="button" title="刪除所選" aria-label="刪除所選" disabled>⌦</button>
        <button class="icon-button danger" id="clearBtn" type="button" title="清除白板" aria-label="清除白板">×</button>
        <button class="icon-button" id="resetViewBtn" type="button" title="回到中心" aria-label="回到中心">⌂</button>
        <button class="icon-button" id="exportPngBtn" type="button" title="匯出 PNG" aria-label="匯出 PNG">⇩</button>
        <button class="icon-button" id="exportJsonBtn" type="button" title="匯出 JSON" aria-label="匯出 JSON">{}</button>
        <button class="icon-button" id="importJsonBtn" type="button" title="匯入 JSON" aria-label="匯入 JSON">⇧</button>
      </div>

      <div class="tool-group" aria-label="縮放比例">
        <span id="zoomLabel">100%</span>
      </div>
    </div>

    <div id="status" role="status" aria-live="polite"></div>
    <textarea id="stickyEditor" aria-label="便條內容"></textarea>
    <input type="file" id="importJsonInput" accept="application/json" hidden>
  </main>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const toolbar = document.getElementById("toolbar");
    const colorPicker = document.getElementById("colorPicker");
    const widthSlider = document.getElementById("widthSlider");
    const widthValue = document.getElementById("widthValue");
    const smoothToggleBtn = document.getElementById("smoothToggleBtn");
    const zoomLabel = document.getElementById("zoomLabel");
    const addStickyBtn = document.getElementById("addStickyBtn");
    const undoBtn = document.getElementById("undoBtn");
    const deleteSelectedBtn = document.getElementById("deleteSelectedBtn");
    const clearBtn = document.getElementById("clearBtn");
    const resetViewBtn = document.getElementById("resetViewBtn");
    const exportPngBtn = document.getElementById("exportPngBtn");
    const exportJsonBtn = document.getElementById("exportJsonBtn");
    const importJsonBtn = document.getElementById("importJsonBtn");
    const importJsonInput = document.getElementById("importJsonInput");
    const statusBox = document.getElementById("status");
    const stickyEditor = document.getElementById("stickyEditor");

    const MIN_ZOOM = 0.1;
    const MAX_ZOOM = 5;
    const GRID_SIZE = 50;
    const MIN_POINT_DISTANCE = 1.5;
    const STROKE_ERASER_TOLERANCE = 8;
    const DEFAULT_STICKY_COLOR = "#fef08a";
    const DEFAULT_STICKY_SIZE = 200;
    const MIN_STICKY_SIZE = 60;
    const MAX_STICKY_SIZE = 800;
    const STICKY_CONTROL_SIZE = 22;
    const STICKY_CONTROL_GAP = 4;
    const STICKY_RESIZE_HANDLE_SIZE = 16;
    const AUTOSAVE_KEY = "infinite-whiteboard.autosave.v1";
    const AUTOSAVE_DELAY = 250;
    const PINCH_ZOOM_DEADZONE = 0.015;
    const SHAPE_TOOLS = new Set(["line", "rect", "circle", "ellipse"]);

    const viewport = {
      x: 0,
      y: 0,
      zoom: 1
    };

    let strokes = [];
    let undoStack = [];
    let redoStack = [];
    let activeTool = "pen";
    let stickyColor = DEFAULT_STICKY_COLOR;
    let smoothStrokes = true;
    let activePointers = new Map();
    let drawingPointerId = null;
    let strokeErasePointerId = null;
    let selectionPointerId = null;
    let selectedStrokeId = null;
    let selectionStartWorld = null;
    let selectionOriginalStroke = null;
    let selectionMoved = false;
    let stickyResizePointerId = null;
    let stickyResizeNoteId = null;
    let stickyResizeStartWorld = null;
    let stickyResizeOriginalNote = null;
    let stickyResizeChanged = false;
    let editingStickyId = null;
    let editingStickyOriginal = null;
    let erasedStrokeIds = new Set();
    let currentStroke = null;
    let previewShape = null;
    let isSpacePressed = false;
    let isPanning = false;
    let panPointerId = null;
    let lastPanPoint = null;
    let pinchState = null;
    let statusTimer = 0;
    let autosaveTimer = 0;
    let redrawQueued = false;
    let layerDirty = true;
    let layerCanvas = document.createElement("canvas");
    let layerCtx = layerCanvas.getContext("2d");

    function cssWidth() {
      return canvas.clientWidth || window.innerWidth;
    }

    function cssHeight() {
      return canvas.clientHeight || window.innerHeight;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function newId(prefix) {
      if (crypto && crypto.randomUUID) {
        return prefix + "-" + crypto.randomUUID();
      }
      return prefix + "-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2);
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function screenToWorld(screenX, screenY) {
      return {
        x: (screenX - cssWidth() / 2) / viewport.zoom + viewport.x,
        y: (screenY - cssHeight() / 2) / viewport.zoom + viewport.y
      };
    }

    function worldToScreen(worldX, worldY) {
      return {
        x: (worldX - viewport.x) * viewport.zoom + cssWidth() / 2,
        y: (worldY - viewport.y) * viewport.zoom + cssHeight() / 2
      };
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, window.innerWidth);
      const height = Math.max(1, window.innerHeight);

      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      resizeLayer();
      redraw();
    }

    function markLayerDirty() {
      layerDirty = true;
    }

    function requestRedraw() {
      if (redrawQueued) return;

      redrawQueued = true;
      requestAnimationFrame(() => {
        redrawQueued = false;
        redraw();
      });
    }

    function resizeLayer() {
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, cssWidth());
      const height = Math.max(1, cssHeight());

      if (layerCanvas.width !== Math.round(width * dpr) || layerCanvas.height !== Math.round(height * dpr)) {
        layerCanvas.width = Math.round(width * dpr);
        layerCanvas.height = Math.round(height * dpr);
        markLayerDirty();
      }
      layerCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function clearCanvas() {
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, cssWidth(), cssHeight());
    }

    function drawGrid() {
      const width = cssWidth();
      const height = cssHeight();
      const worldTopLeft = screenToWorld(0, 0);
      const worldBottomRight = screenToWorld(width, height);
      const gridStep = GRID_SIZE;
      const minX = Math.floor(worldTopLeft.x / gridStep) * gridStep;
      const maxX = Math.ceil(worldBottomRight.x / gridStep) * gridStep;
      const minY = Math.floor(worldTopLeft.y / gridStep) * gridStep;
      const maxY = Math.ceil(worldBottomRight.y / gridStep) * gridStep;

      ctx.save();
      ctx.lineWidth = 1;
      ctx.strokeStyle = "#e8edf2";
      ctx.beginPath();

      for (let x = minX; x <= maxX; x += gridStep) {
        const point = worldToScreen(x, 0);
        ctx.moveTo(Math.round(point.x) + 0.5, 0);
        ctx.lineTo(Math.round(point.x) + 0.5, height);
      }

      for (let y = minY; y <= maxY; y += gridStep) {
        const point = worldToScreen(0, y);
        ctx.moveTo(0, Math.round(point.y) + 0.5);
        ctx.lineTo(width, Math.round(point.y) + 0.5);
      }

      ctx.stroke();

      const origin = worldToScreen(0, 0);
      ctx.strokeStyle = "#d0d8e1";
      ctx.beginPath();
      ctx.moveTo(Math.round(origin.x) + 0.5, 0);
      ctx.lineTo(Math.round(origin.x) + 0.5, height);
      ctx.moveTo(0, Math.round(origin.y) + 0.5);
      ctx.lineTo(width, Math.round(origin.y) + 0.5);
      ctx.stroke();
      ctx.restore();
    }

    function drawAllStrokes() {
      resizeLayer();

      if (layerDirty) {
        layerCtx.save();
        layerCtx.setTransform(1, 0, 0, 1, 0, 0);
        layerCtx.clearRect(0, 0, layerCanvas.width, layerCanvas.height);
        layerCtx.restore();

        for (const stroke of strokes) {
          drawStroke(layerCtx, stroke);
        }

        layerDirty = false;
      }

      ctx.drawImage(layerCanvas, 0, 0, cssWidth(), cssHeight());
    }

    function drawStroke(targetCtx, stroke) {
      if (!stroke || !stroke.type) return;

      if (stroke.type === "freehand" || stroke.type === "eraser") {
        drawFreehand(targetCtx, stroke);
        return;
      }

      if (stroke.type === "sticky") {
        drawStickyNote(targetCtx, stroke);
        return;
      }

      if (stroke.start && stroke.end) {
        drawShape(targetCtx, stroke);
      }
    }

    function drawFreehand(targetCtx, stroke) {
      if (!stroke.points || stroke.points.length === 0) return;

      targetCtx.save();
      targetCtx.globalCompositeOperation = stroke.type === "eraser" ? "destination-out" : "source-over";
      targetCtx.strokeStyle = stroke.color || "#000000";
      targetCtx.lineWidth = Math.max(1, (stroke.width || 1) * viewport.zoom);
      targetCtx.lineCap = "round";
      targetCtx.lineJoin = "round";
      targetCtx.beginPath();

      const first = worldToScreen(stroke.points[0].x, stroke.points[0].y);
      targetCtx.moveTo(first.x, first.y);

      if (stroke.points.length === 1) {
        targetCtx.lineTo(first.x + 0.01, first.y + 0.01);
      } else if (smoothStrokes && stroke.points.length > 2) {
        for (let i = 1; i < stroke.points.length - 1; i += 1) {
          const current = worldToScreen(stroke.points[i].x, stroke.points[i].y);
          const next = worldToScreen(stroke.points[i + 1].x, stroke.points[i + 1].y);
          const midX = (current.x + next.x) / 2;
          const midY = (current.y + next.y) / 2;
          targetCtx.quadraticCurveTo(current.x, current.y, midX, midY);
        }

        const last = worldToScreen(stroke.points[stroke.points.length - 1].x, stroke.points[stroke.points.length - 1].y);
        targetCtx.lineTo(last.x, last.y);
      } else {
        for (let i = 1; i < stroke.points.length; i += 1) {
          const point = worldToScreen(stroke.points[i].x, stroke.points[i].y);
          targetCtx.lineTo(point.x, point.y);
        }
      }

      targetCtx.stroke();
      targetCtx.restore();
    }

    function drawShape(targetCtx, stroke) {
      const start = worldToScreen(stroke.start.x, stroke.start.y);
      const end = worldToScreen(stroke.end.x, stroke.end.y);
      const left = Math.min(start.x, end.x);
      const top = Math.min(start.y, end.y);
      const width = Math.abs(end.x - start.x);
      const height = Math.abs(end.y - start.y);

      targetCtx.save();
      targetCtx.globalCompositeOperation = "source-over";
      targetCtx.strokeStyle = stroke.color || "#000000";
      targetCtx.lineWidth = Math.max(1, (stroke.width || 1) * viewport.zoom);
      targetCtx.lineCap = "round";
      targetCtx.lineJoin = "round";
      targetCtx.beginPath();

      if (stroke.type === "line") {
        targetCtx.moveTo(start.x, start.y);
        targetCtx.lineTo(end.x, end.y);
      } else if (stroke.type === "rect") {
        targetCtx.rect(left, top, width, height);
      } else if (stroke.type === "circle") {
        const side = Math.min(width, height);
        const centerX = start.x + Math.sign(end.x - start.x || 1) * side / 2;
        const centerY = start.y + Math.sign(end.y - start.y || 1) * side / 2;
        targetCtx.arc(centerX, centerY, side / 2, 0, Math.PI * 2);
      } else if (stroke.type === "ellipse") {
        targetCtx.ellipse(left + width / 2, top + height / 2, width / 2, height / 2, 0, 0, Math.PI * 2);
      }

      targetCtx.stroke();
      targetCtx.restore();
    }

    function drawStickyNote(targetCtx, note) {
      if (!isValidStickyNote(note)) return;

      const topLeft = worldToScreen(note.x, note.y);
      const width = Math.max(1, note.noteWidth * viewport.zoom);
      const height = Math.max(1, note.noteHeight * viewport.zoom);
      const radius = Math.min(8, Math.max(3, 6 * viewport.zoom));

      targetCtx.save();
      targetCtx.globalCompositeOperation = "source-over";
      targetCtx.shadowColor = "rgba(33, 44, 62, 0.18)";
      targetCtx.shadowBlur = Math.min(18, 10 * viewport.zoom);
      targetCtx.shadowOffsetY = Math.min(8, 4 * viewport.zoom);
      targetCtx.fillStyle = note.color || "#fef08a";
      targetCtx.strokeStyle = "rgba(115, 88, 15, 0.22)";
      targetCtx.lineWidth = 1;
      targetCtx.beginPath();

      if (typeof targetCtx.roundRect === "function") {
        targetCtx.roundRect(topLeft.x, topLeft.y, width, height, radius);
      } else {
        targetCtx.rect(topLeft.x, topLeft.y, width, height);
      }

      targetCtx.fill();
      targetCtx.shadowColor = "transparent";
      targetCtx.stroke();

      drawStickyText(targetCtx, note, topLeft, width, height);
      drawStickyControls(targetCtx, note, topLeft, width, height);

      targetCtx.restore();
    }

    function drawStickyText(targetCtx, note, topLeft, width, height) {
      if (editingStickyId === note.id) return;

      const text = note.text || "";
      const padding = Math.max(8, 10 * viewport.zoom);
      const controlsHeight = STICKY_CONTROL_SIZE + STICKY_CONTROL_GAP;
      const left = topLeft.x + padding;
      const top = topLeft.y + controlsHeight + padding * 0.45;
      const maxWidth = width - padding * 2;
      const maxHeight = height - controlsHeight - padding * 1.6;

      targetCtx.save();
      targetCtx.fillStyle = "rgba(23, 32, 51, 0.82)";
      targetCtx.font = Math.max(11, 15 * viewport.zoom) + "px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      targetCtx.textBaseline = "top";

      if (text.trim()) {
        const lines = wrapText(targetCtx, text, maxWidth);
        const lineHeight = Math.max(15, 20 * viewport.zoom);
        for (let i = 0; i < lines.length; i += 1) {
          const y = top + i * lineHeight;
          if (y + lineHeight > top + maxHeight) break;
          targetCtx.fillText(lines[i], left, y);
        }
      } else if (note.id === selectedStrokeId) {
        targetCtx.fillStyle = "rgba(23, 32, 51, 0.34)";
        targetCtx.fillText("點編輯輸入文字", left, top);
      }

      targetCtx.restore();
    }

    function wrapText(targetCtx, text, maxWidth) {
      const result = [];
      const paragraphs = text.split(/\n/);

      for (const paragraph of paragraphs) {
        let line = "";
        const chars = Array.from(paragraph);
        for (const char of chars) {
          const testLine = line + char;
          if (line && targetCtx.measureText(testLine).width > maxWidth) {
            result.push(line);
            line = char;
          } else {
            line = testLine;
          }
        }
        result.push(line);
      }

      return result;
    }

    function drawStickyControls(targetCtx, note, topLeft, width, height) {
      const controls = getStickyControlRects(note);

      for (const control of controls.buttons) {
        const isConfirm = control.action === "confirm";
        const isDisabled = isConfirm && editingStickyId !== note.id;
        targetCtx.save();
        targetCtx.fillStyle = isDisabled ? "rgba(255, 255, 255, 0.5)" : "rgba(255, 255, 255, 0.9)";
        targetCtx.strokeStyle = isDisabled ? "rgba(23, 32, 51, 0.12)" : "rgba(23, 32, 51, 0.24)";
        targetCtx.lineWidth = 1;
        targetCtx.beginPath();
        if (typeof targetCtx.roundRect === "function") {
          targetCtx.roundRect(control.x, control.y, control.size, control.size, 5);
        } else {
          targetCtx.rect(control.x, control.y, control.size, control.size);
        }
        targetCtx.fill();
        targetCtx.stroke();
        targetCtx.fillStyle = isDisabled ? "rgba(23, 32, 51, 0.3)" : control.color;
        targetCtx.font = "bold 14px ui-sans-serif, system-ui, sans-serif";
        targetCtx.textAlign = "center";
        targetCtx.textBaseline = "middle";
        targetCtx.fillText(control.label, control.x + control.size / 2, control.y + control.size / 2 + 0.5);
        targetCtx.restore();
      }

      targetCtx.save();
      targetCtx.fillStyle = "rgba(255, 255, 255, 0.58)";
      targetCtx.strokeStyle = "rgba(23, 32, 51, 0.24)";
      targetCtx.lineWidth = 1;
      targetCtx.beginPath();
      targetCtx.moveTo(topLeft.x + width, topLeft.y + height - STICKY_RESIZE_HANDLE_SIZE);
      targetCtx.lineTo(topLeft.x + width, topLeft.y + height);
      targetCtx.lineTo(topLeft.x + width - STICKY_RESIZE_HANDLE_SIZE, topLeft.y + height);
      targetCtx.closePath();
      targetCtx.fill();
      targetCtx.stroke();
      targetCtx.restore();
    }

    function getStickyControlRects(note) {
      const topLeft = worldToScreen(note.x, note.y);
      const width = note.noteWidth * viewport.zoom;
      const height = note.noteHeight * viewport.zoom;
      const size = STICKY_CONTROL_SIZE;
      const gap = STICKY_CONTROL_GAP;
      const top = topLeft.y + gap;
      const right = topLeft.x + width - gap;
      const actions = [
        { action: "confirm", label: "✓", color: "#15803d" },
        { action: "edit", label: "✎", color: "#0f8b8d" },
        { action: "delete", label: "×", color: "#b42318" }
      ];

      return {
        buttons: actions.map((item, index) => ({
          ...item,
          x: right - size * (index + 1) - gap * index,
          y: top,
          size
        })),
        resize: {
          x: topLeft.x + width - STICKY_RESIZE_HANDLE_SIZE,
          y: topLeft.y + height - STICKY_RESIZE_HANDLE_SIZE,
          size: STICKY_RESIZE_HANDLE_SIZE
        }
      };
    }

    function findStickyControlAt(screenPoint) {
      for (let i = strokes.length - 1; i >= 0; i -= 1) {
        const note = strokes[i];
        if (note.type !== "sticky" || !isValidStickyNote(note)) continue;

        const controls = getStickyControlRects(note);
        for (const button of controls.buttons) {
          if (isScreenPointInRect(screenPoint, button)) {
            return {
              note,
              index: i,
              action: button.action
            };
          }
        }

        if (isScreenPointInRect(screenPoint, controls.resize)) {
          return {
            note,
            index: i,
            action: "resize"
          };
        }
      }

      return null;
    }

    function isScreenPointInRect(point, rect) {
      return point.x >= rect.x
        && point.x <= rect.x + rect.size
        && point.y >= rect.y
        && point.y <= rect.y + rect.size;
    }

    function drawPreviewShape() {
      if (!previewShape) return;

      ctx.save();
      ctx.globalAlpha = 0.78;
      ctx.setLineDash([8, 6]);
      drawStroke(ctx, previewShape);
      ctx.restore();
    }

    function drawSelectionBox() {
      if (activeTool !== "select" || !selectedStrokeId) return;

      const stroke = findStrokeById(selectedStrokeId);
      const bounds = getStrokeBounds(stroke);
      if (!bounds) return;

      const padding = Math.max(8, (stroke.width || 1) * viewport.zoom / 2 + 6);
      const topLeft = worldToScreen(bounds.minX, bounds.minY);
      const bottomRight = worldToScreen(bounds.maxX, bounds.maxY);
      const left = Math.min(topLeft.x, bottomRight.x) - padding;
      const top = Math.min(topLeft.y, bottomRight.y) - padding;
      const width = Math.abs(bottomRight.x - topLeft.x) + padding * 2;
      const height = Math.abs(bottomRight.y - topLeft.y) + padding * 2;

      ctx.save();
      ctx.strokeStyle = "#0f8b8d";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 5]);
      ctx.strokeRect(left, top, width, height);
      ctx.setLineDash([]);
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#0f8b8d";

      const handles = [
        [left, top],
        [left + width, top],
        [left + width, top + height],
        [left, top + height]
      ];
      for (const [x, y] of handles) {
        ctx.beginPath();
        ctx.rect(x - 3, y - 3, 6, 6);
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    }

    function redraw() {
      clearCanvas();
      drawGrid();
      drawAllStrokes();
      drawStroke(ctx, currentStroke);
      drawPreviewShape();
      drawSelectionBox();
      updateZoomLabel();
      updateStickyEditorPosition();
    }

    function updateZoomLabel() {
      zoomLabel.textContent = Math.round(viewport.zoom * 100) + "%";
    }

    function setTool(tool) {
      activeTool = tool;
      for (const button of toolbar.querySelectorAll("[data-tool]")) {
        button.classList.toggle("active", button.dataset.tool === tool);
      }
      updatePanCursor();
      requestRedraw();
    }

    function updatePanCursor() {
      canvas.classList.toggle("panning", activeTool === "pan" || isSpacePressed);
    }

    function updateActiveSwatch() {
      const selectedColor = colorPicker.value.toLowerCase();
      for (const swatch of toolbar.querySelectorAll("[data-color]")) {
        swatch.classList.toggle("active", swatch.dataset.color.toLowerCase() === selectedColor);
      }
    }

    function updateActiveStickySwatch() {
      const selectedColor = stickyColor.toLowerCase();
      for (const swatch of toolbar.querySelectorAll("[data-sticky-color]")) {
        swatch.classList.toggle("active", swatch.dataset.stickyColor.toLowerCase() === selectedColor);
      }
    }

    function getSavedBoardData() {
      return {
        version: "1.0",
        savedAt: new Date().toISOString(),
        viewport: {
          x: viewport.x,
          y: viewport.y,
          zoom: viewport.zoom
        },
        settings: {
          color: colorPicker.value,
          width: Number(widthSlider.value),
          stickyColor,
          smoothStrokes
        },
        strokes
      };
    }

    function scheduleAutosave() {
      clearTimeout(autosaveTimer);
      autosaveTimer = setTimeout(saveBoardToLocalStorage, AUTOSAVE_DELAY);
    }

    function saveBoardToLocalStorage() {
      try {
        localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(getSavedBoardData()));
      } catch (error) {
        console.warn("無法自動儲存白板。", error);
      }
    }

    function loadBoardFromLocalStorage() {
      let savedText = "";
      try {
        savedText = localStorage.getItem(AUTOSAVE_KEY);
      } catch (error) {
        console.warn("無法讀取自動儲存白板。", error);
        return;
      }

      if (!savedText) return;

      try {
        const data = JSON.parse(savedText);
        if (!data || !Array.isArray(data.strokes)) return;

        strokes = data.strokes.filter(isValidStroke).map(cloneStroke);
        undoStack = [];
        redoStack = [];
        selectedStrokeId = null;

        if (data.viewport && Number.isFinite(data.viewport.x) && Number.isFinite(data.viewport.y) && Number.isFinite(data.viewport.zoom)) {
          viewport.x = data.viewport.x;
          viewport.y = data.viewport.y;
          viewport.zoom = clamp(data.viewport.zoom, MIN_ZOOM, MAX_ZOOM);
        }

        if (data.settings) {
          if (typeof data.settings.color === "string" && /^#[0-9a-f]{6}$/i.test(data.settings.color)) {
            colorPicker.value = data.settings.color;
          }

          if (Number.isFinite(data.settings.width)) {
            widthSlider.value = String(clamp(data.settings.width, Number(widthSlider.min), Number(widthSlider.max)));
            widthValue.textContent = widthSlider.value + "px";
          }

          if (typeof data.settings.stickyColor === "string" && /^#[0-9a-f]{6}$/i.test(data.settings.stickyColor)) {
            stickyColor = data.settings.stickyColor;
          }

          if (typeof data.settings.smoothStrokes === "boolean") {
            smoothStrokes = data.settings.smoothStrokes;
            smoothToggleBtn.classList.toggle("active", smoothStrokes);
            smoothToggleBtn.setAttribute("aria-pressed", String(smoothStrokes));
          }
        }

        updateUndoButton();
        updateActiveSwatch();
        updateActiveStickySwatch();
        markLayerDirty();
      } catch (error) {
        console.warn("自動儲存資料格式錯誤，已忽略。", error);
      }
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function zoomAt(screenX, screenY, newZoom) {
      const before = screenToWorld(screenX, screenY);
      viewport.zoom = clamp(newZoom, MIN_ZOOM, MAX_ZOOM);
      const after = screenToWorld(screenX, screenY);

      viewport.x += before.x - after.x;
      viewport.y += before.y - after.y;
      markLayerDirty();
      requestRedraw();
      scheduleAutosave();
    }

    function panBy(deltaX, deltaY) {
      viewport.x -= deltaX / viewport.zoom;
      viewport.y -= deltaY / viewport.zoom;
      markLayerDirty();
      requestRedraw();
      scheduleAutosave();
    }

    function cancelDrawing() {
      drawingPointerId = null;
      strokeErasePointerId = null;
      selectionPointerId = null;
      selectionStartWorld = null;
      selectionOriginalStroke = null;
      selectionMoved = false;
      erasedStrokeIds.clear();
      currentStroke = null;
      previewShape = null;
    }

    function addStickyNote() {
      confirmStickyEdit();
      const center = screenToWorld(cssWidth() / 2, cssHeight() / 2);
      const note = {
        id: newId("sticky"),
        type: "sticky",
        color: stickyColor,
        x: center.x - DEFAULT_STICKY_SIZE / 2,
        y: center.y - DEFAULT_STICKY_SIZE / 2,
        noteWidth: DEFAULT_STICKY_SIZE,
        noteHeight: DEFAULT_STICKY_SIZE,
        text: ""
      };

      strokes.push(note);
      selectedStrokeId = note.id;
      setTool("select");
      markLayerDirty();
      pushUndoAction({
        type: "add",
        stroke: cloneStroke(note)
      });
      requestRedraw();
      scheduleAutosave();
      showStatus("已加入 200×200 便條。");
    }

    function handleStickyControl(event, control) {
      selectedStrokeId = control.note.id;
      updateUndoButton();

      if (control.action === "delete") {
        deleteStrokeAtIndex(control.index, "已刪除便條。");
        return true;
      }

      if (control.action === "edit") {
        startStickyEdit(control.note);
        return true;
      }

      if (control.action === "confirm") {
        if (editingStickyId === control.note.id) {
          confirmStickyEdit();
        } else {
          showStatus("這張便條尚未進入編輯。");
        }
        return true;
      }

      if (control.action === "resize") {
        beginStickyResize(event, control.note);
        return true;
      }

      return false;
    }

    function startStickyEdit(note) {
      if (!isValidStickyNote(note)) return;
      confirmStickyEdit();
      editingStickyId = note.id;
      editingStickyOriginal = cloneStroke(note);
      stickyEditor.value = note.text || "";
      stickyEditor.style.display = "block";
      updateStickyEditorPosition();
      stickyEditor.focus();
      stickyEditor.select();
      markLayerDirty();
      requestRedraw();
      showStatus("正在編輯便條。");
    }

    function confirmStickyEdit() {
      if (!editingStickyId) return;

      const note = findStrokeById(editingStickyId);
      if (note && note.type === "sticky") {
        const before = editingStickyOriginal ? cloneStroke(editingStickyOriginal) : cloneStroke(note);
        note.text = stickyEditor.value;
        const after = cloneStroke(note);
        if (JSON.stringify(before) !== JSON.stringify(after)) {
          pushUndoAction({
            type: "update",
            strokeId: note.id,
            before,
            after
          });
          scheduleAutosave();
        }
      }

      editingStickyId = null;
      editingStickyOriginal = null;
      stickyEditor.value = "";
      stickyEditor.style.display = "none";
      markLayerDirty();
      requestRedraw();
    }

    function updateStickyEditorPosition() {
      if (!editingStickyId) return;

      const note = findStrokeById(editingStickyId);
      if (!note || note.type !== "sticky") {
        stickyEditor.style.display = "none";
        editingStickyId = null;
        editingStickyOriginal = null;
        return;
      }

      const topLeft = worldToScreen(note.x, note.y);
      const width = note.noteWidth * viewport.zoom;
      const height = note.noteHeight * viewport.zoom;
      const padding = Math.max(6, 8 * viewport.zoom);
      const topOffset = STICKY_CONTROL_SIZE + STICKY_CONTROL_GAP * 2;
      stickyEditor.style.left = topLeft.x + padding + "px";
      stickyEditor.style.top = topLeft.y + topOffset + "px";
      stickyEditor.style.width = Math.max(48, width - padding * 2) + "px";
      stickyEditor.style.height = Math.max(32, height - topOffset - padding) + "px";
      stickyEditor.style.backgroundColor = note.color || "#fef08a";
      stickyEditor.style.fontSize = Math.max(11, 15 * viewport.zoom) + "px";
    }

    function beginStickyResize(event, note) {
      if (!isValidStickyNote(note)) return;
      confirmStickyEdit();
      stickyResizePointerId = event.pointerId;
      stickyResizeNoteId = note.id;
      stickyResizeStartWorld = screenToWorld(getCanvasPoint(event).x, getCanvasPoint(event).y);
      stickyResizeOriginalNote = cloneStroke(note);
      stickyResizeChanged = false;
      cancelDrawing();
      markLayerDirty();
      requestRedraw();
    }

    function continueStickyResize(event) {
      if (stickyResizePointerId !== event.pointerId || !stickyResizeNoteId || !stickyResizeOriginalNote) return;

      const point = getCanvasPoint(event);
      const world = screenToWorld(point.x, point.y);
      const note = findStrokeById(stickyResizeNoteId);
      if (!note || note.type !== "sticky") return;

      note.noteWidth = clamp(world.x - note.x, MIN_STICKY_SIZE, MAX_STICKY_SIZE);
      note.noteHeight = clamp(world.y - note.y, MIN_STICKY_SIZE, MAX_STICKY_SIZE);
      stickyResizeChanged = true;
      markLayerDirty();
      requestRedraw();
    }

    function endStickyResize(event) {
      if (stickyResizePointerId !== event.pointerId) return;

      const note = stickyResizeNoteId ? findStrokeById(stickyResizeNoteId) : null;
      if (stickyResizeChanged && note && stickyResizeOriginalNote) {
        pushUndoAction({
          type: "update",
          strokeId: note.id,
          before: stickyResizeOriginalNote,
          after: cloneStroke(note)
        });
        scheduleAutosave();
      }

      stickyResizePointerId = null;
      stickyResizeNoteId = null;
      stickyResizeStartWorld = null;
      stickyResizeOriginalNote = null;
      stickyResizeChanged = false;
      markLayerDirty();
      requestRedraw();
    }

    function beginSelection(event, world) {
      confirmStickyEdit();
      selectionPointerId = event.pointerId;
      selectionStartWorld = world;
      selectionMoved = false;

      const hit = findStrokeAt(world);
      if (!hit) {
        selectedStrokeId = null;
        selectionOriginalStroke = null;
        updateUndoButton();
        markLayerDirty();
        requestRedraw();
        return;
      }

      selectedStrokeId = hit.stroke.id;
      selectionOriginalStroke = cloneStroke(hit.stroke);
      updateUndoButton();
      markLayerDirty();
      requestRedraw();
    }

    function continueSelection(world, pointerId) {
      if (selectionPointerId !== pointerId || !selectedStrokeId || !selectionOriginalStroke || !selectionStartWorld) return;

      const deltaX = world.x - selectionStartWorld.x;
      const deltaY = world.y - selectionStartWorld.y;
      const moved = Math.hypot(deltaX, deltaY) >= MIN_POINT_DISTANCE / viewport.zoom;
      if (!moved && !selectionMoved) return;

      const movedStroke = cloneStroke(selectionOriginalStroke);
      translateStroke(movedStroke, deltaX, deltaY);

      if (replaceStrokeById(selectedStrokeId, movedStroke)) {
        selectionMoved = true;
        markLayerDirty();
        requestRedraw();
      }
    }

    function endSelection(event) {
      if (selectionPointerId !== event.pointerId) return;

      const finalStroke = selectedStrokeId ? findStrokeById(selectedStrokeId) : null;
      if (selectionMoved && selectionOriginalStroke && finalStroke) {
        pushUndoAction({
          type: "move",
          strokeId: selectedStrokeId,
          before: selectionOriginalStroke,
          after: cloneStroke(finalStroke)
        });
        scheduleAutosave();
      }

      selectionPointerId = null;
      selectionStartWorld = null;
      selectionOriginalStroke = null;
      selectionMoved = false;
    }

    function pushUndoAction(action) {
      undoStack.push(action);
      redoStack = [];
      updateUndoButton();
    }

    function updateUndoButton() {
      undoBtn.disabled = undoStack.length === 0;
      deleteSelectedBtn.disabled = !selectedStrokeId;
    }

    function findStrokeById(id) {
      return strokes.find((stroke) => stroke.id === id) || null;
    }

    function findStrokeIndexById(id) {
      return strokes.findIndex((stroke) => stroke.id === id);
    }

    function replaceStrokeById(id, stroke) {
      const index = findStrokeIndexById(id);
      if (index >= 0) {
        strokes[index] = stroke;
        return true;
      }
      return false;
    }

    function translateStroke(stroke, deltaX, deltaY) {
      if (!stroke) return;

      if (stroke.points) {
        for (const point of stroke.points) {
          point.x += deltaX;
          point.y += deltaY;
        }
      }

      if (stroke.start) {
        stroke.start.x += deltaX;
        stroke.start.y += deltaY;
      }

      if (stroke.end) {
        stroke.end.x += deltaX;
        stroke.end.y += deltaY;
      }

      if (stroke.type === "sticky") {
        stroke.x += deltaX;
        stroke.y += deltaY;
      }
    }

    function getStrokeBounds(stroke) {
      if (!stroke) return null;

      if (stroke.type === "sticky" && isValidStickyNote(stroke)) {
        return {
          minX: stroke.x,
          minY: stroke.y,
          maxX: stroke.x + stroke.noteWidth,
          maxY: stroke.y + stroke.noteHeight
        };
      }

      const points = [];
      if (stroke.points) points.push(...stroke.points);
      if (stroke.start) points.push(stroke.start);
      if (stroke.end) points.push(stroke.end);
      if (points.length === 0) return null;

      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;

      for (const point of points) {
        minX = Math.min(minX, point.x);
        minY = Math.min(minY, point.y);
        maxX = Math.max(maxX, point.x);
        maxY = Math.max(maxY, point.y);
      }

      if (stroke.type === "circle" && stroke.start && stroke.end) {
        const width = Math.abs(stroke.end.x - stroke.start.x);
        const height = Math.abs(stroke.end.y - stroke.start.y);
        const side = Math.min(width, height);
        const circleEnd = {
          x: stroke.start.x + Math.sign(stroke.end.x - stroke.start.x || 1) * side,
          y: stroke.start.y + Math.sign(stroke.end.y - stroke.start.y || 1) * side
        };
        minX = Math.min(stroke.start.x, circleEnd.x);
        minY = Math.min(stroke.start.y, circleEnd.y);
        maxX = Math.max(stroke.start.x, circleEnd.x);
        maxY = Math.max(stroke.start.y, circleEnd.y);
      }

      return {
        minX,
        minY,
        maxX,
        maxY
      };
    }

    function commitStroke(stroke) {
      if (!stroke) return;

      if ((stroke.type === "freehand" || stroke.type === "eraser") && (!stroke.points || stroke.points.length < 1)) {
        return;
      }

      if (SHAPE_TOOLS.has(stroke.type) && (!stroke.start || !stroke.end)) {
        return;
      }

      if (stroke.type === "sticky") {
        if (!isValidStickyNote(stroke)) return;
        delete stroke.start;
        delete stroke.end;
      }

      strokes.push(stroke);
      markLayerDirty();
      pushUndoAction({
        type: "add",
        stroke
      });
      scheduleAutosave();
    }

    function undoLastAction() {
      const action = undoStack.pop();
      if (!action) {
        showStatus("沒有可以返回的動作。");
        updateUndoButton();
        return;
      }

      if (action.type === "add") {
        removeStrokeById(action.stroke.id);
        if (selectedStrokeId === action.stroke.id) {
          selectedStrokeId = null;
        }
      } else if (action.type === "delete") {
        const insertAt = clamp(action.index, 0, strokes.length);
        strokes.splice(insertAt, 0, action.stroke);
        selectedStrokeId = action.stroke.id;
      } else if (action.type === "move" || action.type === "update") {
        replaceStrokeById(action.strokeId, cloneStroke(action.before));
        selectedStrokeId = action.strokeId;
      } else if (action.type === "clear") {
        strokes = action.strokes.map(cloneStroke);
        selectedStrokeId = null;
      }

      redoStack.push(action);
      cancelDrawing();
      if (editingStickyId && !findStrokeById(editingStickyId)) {
        editingStickyId = null;
        editingStickyOriginal = null;
        stickyEditor.style.display = "none";
      }
      markLayerDirty();
      requestRedraw();
      updateUndoButton();
      scheduleAutosave();
      showStatus("已返回上一步。");
    }

    function deleteSelectedStroke() {
      if (!selectedStrokeId) {
        showStatus("尚未選取任何物件。");
        return;
      }

      const index = findStrokeIndexById(selectedStrokeId);
      if (index < 0) {
        selectedStrokeId = null;
        updateUndoButton();
        requestRedraw();
        return;
      }

      deleteStrokeAtIndex(index, "已刪除所選物件。");
    }

    function deleteStrokeAtIndex(index, message) {
      if (index < 0 || index >= strokes.length) return;

      const removed = strokes[index];
      if (editingStickyId === removed.id) {
        editingStickyId = null;
        editingStickyOriginal = null;
        stickyEditor.value = "";
        stickyEditor.style.display = "none";
      }

      strokes.splice(index, 1);
      pushUndoAction({
        type: "delete",
        stroke: removed,
        index
      });
      selectedStrokeId = null;
      cancelDrawing();
      markLayerDirty();
      requestRedraw();
      updateUndoButton();
      scheduleAutosave();
      if (message) {
        showStatus(message);
      }
    }

    function removeStrokeById(id) {
      const index = findStrokeIndexById(id);
      if (index >= 0) {
        strokes.splice(index, 1);
      }
    }

    function eraseStrokeAt(world) {
      const hit = findStrokeAt(world);
      if (!hit || erasedStrokeIds.has(hit.stroke.id)) return false;

      strokes.splice(hit.index, 1);
      if (selectedStrokeId === hit.stroke.id) {
        selectedStrokeId = null;
        updateUndoButton();
      }
      if (editingStickyId === hit.stroke.id) {
        editingStickyId = null;
        editingStickyOriginal = null;
        stickyEditor.value = "";
        stickyEditor.style.display = "none";
      }
      erasedStrokeIds.add(hit.stroke.id);
      pushUndoAction({
        type: "delete",
        stroke: hit.stroke,
        index: hit.index
      });
      markLayerDirty();
      requestRedraw();
      scheduleAutosave();
      return true;
    }

    function findStrokeAt(world) {
      for (let i = strokes.length - 1; i >= 0; i -= 1) {
        const stroke = strokes[i];
        if (stroke.type === "eraser") continue;

        if (isStrokeHit(stroke, world)) {
          return {
            stroke,
            index: i
          };
        }
      }
      return null;
    }

    function isStrokeHit(stroke, world) {
      const tolerance = Math.max(STROKE_ERASER_TOLERANCE / viewport.zoom, (stroke.width || 1) / 2 + 3 / viewport.zoom);

      if (stroke.type === "freehand") {
        return isPointNearPolyline(world, stroke.points || [], tolerance);
      }

      if (stroke.type === "line") {
        return distanceToSegment(world, stroke.start, stroke.end) <= tolerance;
      }

      if (stroke.type === "rect") {
        return isPointNearRect(world, stroke.start, stroke.end, tolerance);
      }

      if (stroke.type === "circle") {
        return isPointNearCircle(world, stroke.start, stroke.end, tolerance);
      }

      if (stroke.type === "ellipse") {
        return isPointNearEllipse(world, stroke.start, stroke.end, tolerance);
      }

      if (stroke.type === "sticky") {
        return isPointInStickyNote(world, stroke);
      }

      return false;
    }

    function isPointInStickyNote(point, note) {
      return isValidStickyNote(note)
        && point.x >= note.x
        && point.x <= note.x + note.noteWidth
        && point.y >= note.y
        && point.y <= note.y + note.noteHeight;
    }

    function isPointNearPolyline(point, points, tolerance) {
      if (points.length === 0) return false;
      if (points.length === 1) return distance(point, points[0]) <= tolerance;

      for (let i = 1; i < points.length; i += 1) {
        if (distanceToSegment(point, points[i - 1], points[i]) <= tolerance) {
          return true;
        }
      }
      return false;
    }

    function distanceToSegment(point, start, end) {
      if (!isValidPoint(start) || !isValidPoint(end)) return Infinity;

      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const lengthSq = dx * dx + dy * dy;
      if (lengthSq === 0) return distance(point, start);

      const t = clamp(((point.x - start.x) * dx + (point.y - start.y) * dy) / lengthSq, 0, 1);
      return distance(point, {
        x: start.x + dx * t,
        y: start.y + dy * t
      });
    }

    function isPointNearRect(point, start, end, tolerance) {
      if (!isValidPoint(start) || !isValidPoint(end)) return false;

      const left = Math.min(start.x, end.x);
      const right = Math.max(start.x, end.x);
      const top = Math.min(start.y, end.y);
      const bottom = Math.max(start.y, end.y);
      const corners = [
        { x: left, y: top },
        { x: right, y: top },
        { x: right, y: bottom },
        { x: left, y: bottom }
      ];

      return corners.some((corner, index) => distanceToSegment(point, corner, corners[(index + 1) % corners.length]) <= tolerance);
    }

    function isPointNearCircle(point, start, end, tolerance) {
      if (!isValidPoint(start) || !isValidPoint(end)) return false;

      const width = Math.abs(end.x - start.x);
      const height = Math.abs(end.y - start.y);
      const side = Math.min(width, height);
      if (side === 0) return distance(point, start) <= tolerance;

      const center = {
        x: start.x + Math.sign(end.x - start.x || 1) * side / 2,
        y: start.y + Math.sign(end.y - start.y || 1) * side / 2
      };

      return Math.abs(distance(point, center) - side / 2) <= tolerance;
    }

    function isPointNearEllipse(point, start, end, tolerance) {
      if (!isValidPoint(start) || !isValidPoint(end)) return false;

      const left = Math.min(start.x, end.x);
      const right = Math.max(start.x, end.x);
      const top = Math.min(start.y, end.y);
      const bottom = Math.max(start.y, end.y);
      const rx = (right - left) / 2;
      const ry = (bottom - top) / 2;
      if (rx === 0 || ry === 0) {
        return distanceToSegment(point, start, end) <= tolerance;
      }

      const center = {
        x: left + rx,
        y: top + ry
      };
      const normalized = Math.hypot((point.x - center.x) / rx, (point.y - center.y) / ry);
      const averageRadius = (rx + ry) / 2;

      return Math.abs(normalized - 1) * averageRadius <= tolerance;
    }

    function beginDrawing(event) {
      confirmStickyEdit();
      const point = getCanvasPoint(event);
      const world = screenToWorld(point.x, point.y);
      drawingPointerId = event.pointerId;

      if (activeTool === "strokeEraser") {
        strokeErasePointerId = event.pointerId;
        erasedStrokeIds = new Set();
        eraseStrokeAt(world);
        return;
      }

      if (activeTool === "select") {
        beginSelection(event, world);
        return;
      }

      if (activeTool === "pen" || activeTool === "eraser") {
        currentStroke = {
          id: newId("stroke"),
          type: activeTool === "pen" ? "freehand" : "eraser",
          color: colorPicker.value,
          width: Number(widthSlider.value),
          points: [world]
        };
        requestRedraw();
        return;
      }

      if (SHAPE_TOOLS.has(activeTool)) {
        previewShape = {
          id: newId("stroke"),
          type: activeTool,
          color: colorPicker.value,
          width: Number(widthSlider.value),
          start: world,
          end: world
        };
        requestRedraw();
      }

    }

    function continueDrawing(event) {
      const coalesced = typeof event.getCoalescedEvents === "function" ? event.getCoalescedEvents() : [];
      const samples = coalesced.length > 0 ? coalesced : [event];

      for (const sample of samples) {
        continueDrawingPoint(sample, event.pointerId);
      }
    }

    function continueDrawingPoint(event, pointerId) {
      const point = getCanvasPoint(event);
      const world = screenToWorld(point.x, point.y);

      if (activeTool === "strokeEraser" && strokeErasePointerId === pointerId) {
        eraseStrokeAt(world);
        return;
      }

      if (activeTool === "select") {
        continueSelection(world, pointerId);
        return;
      }

      if (drawingPointerId !== pointerId) return;

      if (currentStroke) {
        const last = currentStroke.points[currentStroke.points.length - 1];
        if (distance(last, world) >= MIN_POINT_DISTANCE / viewport.zoom) {
          currentStroke.points.push(world);
          requestRedraw();
        }
        return;
      }

      if (previewShape) {
        previewShape.end = world;
        requestRedraw();
      }
    }

    function endDrawing(event) {
      if (activeTool === "strokeEraser" && strokeErasePointerId === event.pointerId) {
        strokeErasePointerId = null;
        erasedStrokeIds.clear();
        return;
      }

      if (activeTool === "select") {
        endSelection(event);
        return;
      }

      if (drawingPointerId !== event.pointerId) return;
      continueDrawing(event);

      if (currentStroke) {
        commitStroke(currentStroke);
      } else if (previewShape) {
        commitStroke(previewShape);
      }

      cancelDrawing();
      markLayerDirty();
      requestRedraw();
      scheduleAutosave();
    }

    function beginPan(event) {
      confirmStickyEdit();
      isPanning = true;
      panPointerId = event.pointerId;
      lastPanPoint = getCanvasPoint(event);
      canvas.classList.add("dragging-pan");
      cancelDrawing();
    }

    function continuePan(event) {
      if (!isPanning || panPointerId !== event.pointerId) return;

      const point = getCanvasPoint(event);
      panBy(point.x - lastPanPoint.x, point.y - lastPanPoint.y);
      lastPanPoint = point;
    }

    function endPan(event) {
      if (panPointerId !== event.pointerId) return;
      isPanning = false;
      panPointerId = null;
      lastPanPoint = null;
      canvas.classList.remove("dragging-pan");
    }

    function getPointerPair() {
      const pointers = Array.from(activePointers.values());
      if (pointers.length < 2) return null;
      return [pointers[0], pointers[1]];
    }

    function getPinchInfo(pair) {
      const center = {
        x: (pair[0].x + pair[1].x) / 2,
        y: (pair[0].y + pair[1].y) / 2
      };
      return {
        center,
        distance: distance(pair[0], pair[1])
      };
    }

    function beginPinch() {
      const pair = getPointerPair();
      if (!pair) return;

      cancelDrawing();
      if (isPanning) {
        isPanning = false;
        panPointerId = null;
        canvas.classList.remove("dragging-pan");
      }

      const info = getPinchInfo(pair);
      pinchState = {
        center: info.center,
        distance: Math.max(1, info.distance)
      };
    }

    function continuePinch() {
      const pair = getPointerPair();
      if (!pair || !pinchState) return;

      const info = getPinchInfo(pair);
      const oldCenter = pinchState.center;
      const rawScale = Math.max(1, info.distance) / pinchState.distance;
      const scale = Math.abs(rawScale - 1) < PINCH_ZOOM_DEADZONE ? 1 : rawScale;

      panBy(info.center.x - oldCenter.x, info.center.y - oldCenter.y);
      if (scale !== 1) {
        zoomAt(info.center.x, info.center.y, viewport.zoom * scale);
      }

      pinchState = {
        center: info.center,
        distance: Math.max(1, info.distance)
      };
    }

    function updateActivePointer(event) {
      activePointers.set(event.pointerId, getCanvasPoint(event));
    }

    function preventAppGesture(event) {
      if (isEditingTextInput(event.target)) return;
      if (event.target.closest && event.target.closest("#app")) {
        event.preventDefault();
      }
    }

    canvas.addEventListener("pointerdown", (event) => {
      if (event.target !== canvas) return;
      event.preventDefault();
      canvas.setPointerCapture(event.pointerId);
      updateActivePointer(event);

      if (activePointers.size === 2) {
        beginPinch();
        return;
      }

      if (activePointers.size > 2) {
        cancelDrawing();
        return;
      }

      const control = findStickyControlAt(getCanvasPoint(event));
      if (control && handleStickyControl(event, control)) {
        return;
      }

      if (event.button === 1 || event.button === 2 || isSpacePressed || activeTool === "pan") {
        beginPan(event);
      } else {
        beginDrawing(event);
      }
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!activePointers.has(event.pointerId)) return;
      event.preventDefault();
      updateActivePointer(event);

      if (activePointers.size >= 2) {
        continuePinch();
      } else if (stickyResizePointerId === event.pointerId) {
        continueStickyResize(event);
      } else if (isPanning) {
        continuePan(event);
      } else {
        continueDrawing(event);
      }
    });

    function finishPointer(event) {
      if (activePointers.has(event.pointerId)) {
        activePointers.delete(event.pointerId);
      }

      if (pinchState) {
        cancelDrawing();
        pinchState = null;
      } else if (stickyResizePointerId === event.pointerId) {
        endStickyResize(event);
      } else if (isPanning) {
        endPan(event);
      } else {
        endDrawing(event);
      }

      if (canvas.hasPointerCapture && canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
    }

    canvas.addEventListener("pointerup", finishPointer);
    canvas.addEventListener("pointercancel", finishPointer);
    canvas.addEventListener("pointerleave", (event) => {
      if (event.pointerType === "mouse" && event.buttons !== 0) {
        finishPointer(event);
      }
    });

    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      const point = getCanvasPoint(event);
      const zoomFactor = event.deltaY < 0 ? 1.1 : 0.9;
      zoomAt(point.x, point.y, viewport.zoom * zoomFactor);
    }, { passive: false });

    document.addEventListener("contextmenu", preventAppGesture, { capture: true });
    document.addEventListener("selectstart", preventAppGesture, { capture: true });
    document.addEventListener("gesturestart", preventAppGesture, { passive: false });
    document.addEventListener("gesturechange", preventAppGesture, { passive: false });
    document.addEventListener("gestureend", preventAppGesture, { passive: false });

    toolbar.addEventListener("click", (event) => {
      const button = event.target.closest("[data-tool]");
      if (button) {
        setTool(button.dataset.tool);
      }

      const swatch = event.target.closest("[data-color]");
      if (swatch) {
        colorPicker.value = swatch.dataset.color;
        updateActiveSwatch();
        scheduleAutosave();
      }

      const stickySwatch = event.target.closest("[data-sticky-color]");
      if (stickySwatch) {
        stickyColor = stickySwatch.dataset.stickyColor;
        updateActiveStickySwatch();
        scheduleAutosave();
      }
    });

    colorPicker.addEventListener("input", () => {
      updateActiveSwatch();
      scheduleAutosave();
    });

    widthSlider.addEventListener("input", () => {
      widthValue.textContent = widthSlider.value + "px";
      scheduleAutosave();
    });

    smoothToggleBtn.addEventListener("click", () => {
      smoothStrokes = !smoothStrokes;
      smoothToggleBtn.classList.toggle("active", smoothStrokes);
      smoothToggleBtn.setAttribute("aria-pressed", String(smoothStrokes));
      markLayerDirty();
      requestRedraw();
      scheduleAutosave();
      showStatus(smoothStrokes ? "筆跡平滑已開啟。" : "筆跡平滑已關閉。");
    });

    addStickyBtn.addEventListener("click", addStickyNote);
    undoBtn.addEventListener("click", undoLastAction);
    deleteSelectedBtn.addEventListener("click", deleteSelectedStroke);

    stickyEditor.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.code === "Enter") {
        event.preventDefault();
        confirmStickyEdit();
      }
    });

    clearBtn.addEventListener("click", () => {
      if (confirm("確定要清除整個白板嗎？")) {
        if (strokes.length > 0) {
          pushUndoAction({
            type: "clear",
            strokes: strokes.map(cloneStroke)
          });
        }
        strokes = [];
        selectedStrokeId = null;
        editingStickyId = null;
        editingStickyOriginal = null;
        stickyEditor.value = "";
        stickyEditor.style.display = "none";
        redoStack = [];
        cancelDrawing();
        markLayerDirty();
        requestRedraw();
        updateUndoButton();
        scheduleAutosave();
        showStatus("白板已清除。");
      }
    });

    resetViewBtn.addEventListener("click", () => {
      viewport.x = 0;
      viewport.y = 0;
      viewport.zoom = 1;
      markLayerDirty();
      requestRedraw();
      scheduleAutosave();
      showStatus("已回到白板中心。");
    });

    exportPngBtn.addEventListener("click", () => {
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = "whiteboard.png";
      document.body.appendChild(link);
      link.click();
      link.remove();
      showStatus("已匯出 PNG。");
    });

    exportJsonBtn.addEventListener("click", exportJSON);

    importJsonBtn.addEventListener("click", () => {
      importJsonInput.value = "";
      importJsonInput.click();
    });

    importJsonInput.addEventListener("change", async () => {
      const file = importJsonInput.files && importJsonInput.files[0];
      if (!file) return;

      try {
        const text = await file.text();
        const data = JSON.parse(text);
        importJSON(data);
        showStatus("JSON 已匯入。");
      } catch (error) {
        alert("匯入失敗：這不是有效的 JSON 檔案。");
      }
    });

    window.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && !event.shiftKey && event.code === "KeyZ" && !isEditingTextInput(event.target)) {
        event.preventDefault();
        undoLastAction();
        return;
      }

      if ((event.code === "Delete" || event.code === "Backspace") && !isEditingTextInput(event.target)) {
        event.preventDefault();
        deleteSelectedStroke();
        return;
      }

      if (event.code === "Space" && !isEditingTextInput(event.target)) {
        event.preventDefault();
        isSpacePressed = true;
        updatePanCursor();
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.code === "Space") {
        isSpacePressed = false;
        updatePanCursor();
      }
    });

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("pagehide", () => {
      confirmStickyEdit();
      saveBoardToLocalStorage();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") {
        confirmStickyEdit();
        saveBoardToLocalStorage();
      }
    });

    function isEditingTextInput(target) {
      return target && ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName);
    }

    function exportJSON() {
      const data = {
        version: "1.0",
        createdAt: new Date().toISOString(),
        viewport: {
          x: viewport.x,
          y: viewport.y,
          zoom: viewport.zoom
        },
        strokes
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], {
        type: "application/json"
      });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "whiteboard.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showStatus("已匯出 JSON。");
    }

    function importJSON(data) {
      if (!data || !Array.isArray(data.strokes)) {
        alert("匯入失敗：JSON 格式不符合白板資料格式。");
        return;
      }

      strokes = data.strokes.filter(isValidStroke).map(cloneStroke);
      undoStack = [];
      redoStack = [];
      selectedStrokeId = null;
      editingStickyId = null;
      editingStickyOriginal = null;
      stickyEditor.value = "";
      stickyEditor.style.display = "none";
      updateUndoButton();

      if (data.viewport && Number.isFinite(data.viewport.x) && Number.isFinite(data.viewport.y) && Number.isFinite(data.viewport.zoom)) {
        viewport.x = data.viewport.x;
        viewport.y = data.viewport.y;
        viewport.zoom = clamp(data.viewport.zoom, MIN_ZOOM, MAX_ZOOM);
      }

      cancelDrawing();
      markLayerDirty();
      requestRedraw();
      scheduleAutosave();
    }

    function isValidPoint(point) {
      return point && Number.isFinite(point.x) && Number.isFinite(point.y);
    }

    function isValidStroke(stroke) {
      if (!stroke || typeof stroke.type !== "string") return false;

      if (stroke.type === "freehand" || stroke.type === "eraser") {
        return Array.isArray(stroke.points) && stroke.points.every(isValidPoint);
      }

      if (SHAPE_TOOLS.has(stroke.type)) {
        return isValidPoint(stroke.start) && isValidPoint(stroke.end);
      }

      if (stroke.type === "sticky") {
        return isValidStickyNote(stroke);
      }

      return false;
    }

    function isValidStickyNote(note) {
      return note
        && Number.isFinite(note.x)
        && Number.isFinite(note.y)
        && Number.isFinite(note.noteWidth)
        && Number.isFinite(note.noteHeight)
        && note.noteWidth > 0
        && note.noteHeight > 0
        && (typeof note.color === "string" || typeof note.color === "undefined");
    }

    function cloneStroke(stroke) {
      return JSON.parse(JSON.stringify(stroke));
    }

    function showStatus(message) {
      clearTimeout(statusTimer);
      statusBox.textContent = message;
      statusBox.classList.add("visible");
      statusTimer = setTimeout(() => {
        statusBox.classList.remove("visible");
      }, 1800);
    }

    loadBoardFromLocalStorage();
    resizeCanvas();
    setTool(activeTool);
    updateActiveSwatch();
    updateActiveStickySwatch();
    updateUndoButton();
  </script>
</body>
</html>
